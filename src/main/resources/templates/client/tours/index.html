<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{client/layouts/main}">
    <body>
        <div layout:fragment="content">
            <div class="page-header text-center py-5 bg-light">
                <div class="container">
                    <h1 class="font-weight-bold">Khám Phá Các Điểm Đến</h1>
                    <p class="text-muted">Tìm kiếm chuyến đi mơ ước của bạn với hàng trăm lựa chọn</p>
                </div>
            </div>

            <div class="container my-5">
                <div class="search-bar-container p-4 mb-5 rounded shadow-sm bg-white">
                    <form th:action="@{/tours}" method="GET" class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label for="name" class="form-label font-weight-bold">Điểm đến / Tên tour</label>
                            <input type="text" class="form-control" id="name" name="name" th:value="${currentSearch}" placeholder="Ví dụ: Paris, Bali...">
                        </div>
                        <div class="col-md-3">
                            <label for="categoryId" class="form-label font-weight-bold">Category</label>
                            <select name="categoryId" class="form-select" id="categoryId">
                                <option value="">All categories</option>
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}"
                                        th:text="${category.name}"
                                        th:selected="${currentCategory != '' and currentCategory == category.id}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="date" class="form-label font-weight-bold">Ngày khởi hành</label>
                            <input type="date" class="form-control" id="date" name="startDate" th:value="${currentStartDate}">
                        </div>
                        <div class="col-md-3">
                            <label for="price" class="form-label font-weight-bold">Mức giá tối đa</label>
                            <select class="form-select" id="price" name="maxPrice">
                                <option value="">Tất cả mức giá</option>
                                <option value="500" th:selected="${currentMaxPrice != null and currentMaxPrice == 500}">Dưới $500</option>
                                <option value="1000" th:selected="${currentMaxPrice != null and currentMaxPrice == 1000}">Dưới $1,000</option>
                                <option value="2000" th:selected="${currentMaxPrice != null and currentMaxPrice == 2000}">Dưới $2,000</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100 tour-search-btn">Search</button>
                        </div>
                    </form>
                </div>

                <div class="tour-grid">
                    <div class="tour-card" th:each="tour : ${tours}">
                        <div class="tour-card-image">
                            <img th:src="${tour.imageUrl != null ? tour.imageUrl : '/uploads/tours/default-tour.jpg'}" alt="Tour image">
                            <span class="tour-card-badge">HOT</span>
                        </div>
                        <div class="tour-card-content">
                            <h3 class="tour-card-title" th:text="${tour.name}"></h3>
                            <p class="tour-card-subtitle" th:text="${tour.categoryName} + ' • ' + ${tour.durationDays} + ' days'"></p>
                            <p class="tour-card-description" th:text="${tour.description}"></p>
                            <div class="tour-card-footer">
                                <span class="tour-card-price" th:text="'$' + ${tour.price}"></span>
                                <a th:href="@{/tours/{id}(id=${tour.id})}" class="tour-card-btn text-decoration-none">Detail</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(tours)}"
                     class="alert alert-info text-center">
                    Không tìm thấy tour phù hợp.
                </div>

                <!-- Pagination Footer -->
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <div>
                        Showing page <span th:text="${pageNumber}">1</span> of <span th:text="${totalPages}">1</span>
                        (<span th:text="${totalElements}">0</span> items total)
                    </div>
                    <nav th:if="${totalPages > 0}" th:with="prevPage=${pageNumber - 2}, nextPage=${pageNumber}">
                        <ul class="pagination mb-0">
                            <!-- Previous Button -->
                            <li class="page-item" th:classappend="${pageNumber <= 1 ? 'disabled' : ''}">
                                <a class="page-link"
                                   th:if="${pageNumber <= 1}"
                                   href="javascript:void(0);"
                                   aria-label="Previous">«</a>
                                <a class="page-link"
                                   th:unless="${pageNumber <= 1}"
                                   th:href="@{/tours(page=${prevPage}, search=${currentSearch}, category=${currentCategory}, startDate=${currentStartDate}, maxPrice=${currentMaxPrice})}"
                                   aria-label="Previous">«</a>
                            </li>

                            <!-- First Page Link -->
                            <li class="page-item" th:if="${pageNumber > 1}">
                                <a class="page-link" th:href="@{/tours(page=0, search=${currentSearch}, category=${currentCategory}, startDate=${currentStartDate}, maxPrice=${currentMaxPrice})}">1</a>
                            </li>

                            <!-- Current Page -->
                            <li class="page-item active">
                                <a class="page-link" href="javascript:void(0);" th:text="${pageNumber}">1</a>
                            </li>

                            <!-- Next Page Link -->
                            <li class="page-item" th:if="${pageNumber < totalPages}">
                                <a class="page-link" th:href="@{/tours(page=${nextPage}, search=${currentSearch}, category=${currentCategory}, startDate=${currentStartDate}, maxPrice=${maxPrice})}">
                                    <span th:text="${pageNumber + 1}">2</span>
                                </a>
                            </li>

                            <!-- Next Button -->
                            <li class="page-item" th:classappend="${pageNumber >= totalPages ? 'disabled' : ''}">
                                <a class="page-link"
                                   th:if="${pageNumber >= totalPages}"
                                   href="javascript:void(0);"
                                   aria-label="Next">»</a>
                                <a class="page-link"
                                   th:unless="${pageNumber >= totalPages}"
                                   th:href="@{/tours(page=${nextPage}, search=${currentSearch}, category=${currentCategory}, startDate=${currentStartDate}, maxPrice=${maxPrice})}"                           aria-label="Next">»</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </body>
</html>
