<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{client/layouts/main}"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity4">
    <body>
        <div layout:fragment="content">
            <div class="container my-5">

                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/tours}">Tours</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${tour.name}"></li>
                    </ol>
                </nav>

                <div class="row">
                    <div th:if="${successMessage}"
                         class="alert alert-success alert-dismissible fade show">
                        <span th:text="${successMessage}"></span>
                        <button type="button"
                                class="btn-close"
                                data-bs-dismiss="alert">
                        </button>
                    </div>
                    <div th:if="${errorMessage}"
                         class="alert alert-danger">
                        <span th:text="${errorMessage}"></span>

                    </div>
                    <div class="col-lg-8 mb-4">
                        <h1 class="fw-bold mb-2" th:text="${tour.name}"></h1>
                        <div class="mb-3">
                            <span class="text-warning fs-4">★</span>

                            <span class="fw-bold" th:text="${tour.averageRating}"></span>
                            <span>
                                (
                                <span th:text="${tour.reviewCount}">
                                </span>
                                reviews
                                )
                            </span>
                        </div>
                        <p class="text-muted mb-4" th:text="|${tour.categoryName} • ${tour.durationDays} days|"><i class="bi bi-geo-alt"></i></p>

                        <div class="tour-detail-gallery mb-4 rounded overflow-hidden">

                            <!-- Main Image -->
                            <div class="mb-3">
                                <img id="mainImage"
                                     th:src="${#lists.isEmpty(tourImages) ? '/uploads/tours/default-tour.jpg' : tourImages[0].imageUrl}"
                                     class="img-fluid w-100 rounded"
                                     style="height:500px;object-fit:cover;"
                                     alt="Tour Image">
                            </div>

                            <!-- Thumbnail Images -->
                            <div class="row g-2">

                                <div class="col-3"
                                     th:each="image : ${tourImages}">

                                    <img th:src="${image.imageUrl}"
                                         class="img-fluid rounded tour-thumbnail"
                                         style="height:100px;width:100%;object-fit:cover;cursor:pointer;"
                                         alt="Tour Image">
                                </div>
                            </div>
                        </div>

                        <div class="tour-section mb-4">
                            <h4 class="fw-bold mb-3">Tổng quan</h4>
                            <p th:text="${tour.description}"></p>
                        </div>

                        <div class="tour-section mb-4">
                            <h4 class="fw-bold mb-3">Lịch trình chi tiết</h4>
                            <div class="accordion" id="itineraryAccordion">
                                <div class="accordion-item" th:each="itinerary : ${tourItineraries}">
                                    <h2 class="accordion-header" id="headingOne">
                                        <button class="accordion-button fw-bold" type="button"
                                                data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="true"
                                                aria-controls="collapseOne"
                                                th:text="'Day ' + ${itinerary.dayNumber} + ' : ' + ${itinerary.title}">
                                        </button>
                                    </h2>
                                    <div id="collapseOne" class="accordion-collapse collapse show" aria-labelledby="headingOne" data-bs-parent="#itineraryAccordion">
                                        <div class="accordion-body" th:text="${itinerary.description}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="tour-section mt-5">
                            <form th:action="@{/tours/{id}/reviews(id=${tour.id})}" method="post" sec:authorize="isAuthenticated()">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <select name="rating" class="form-control">
                                    <option value="5">⭐⭐⭐⭐⭐</option>
                                    <option value="4">⭐⭐⭐⭐</option>
                                    <option value="3">⭐⭐⭐</option>
                                    <option value="2">⭐⭐</option>
                                    <option value="1">⭐</option>

                                </select>
                                <textarea name="comment" class="form-control mt-3" placeholder="Your review"></textarea>
                                <button class="btn btn-primary mt-3">Submit Review</button>
                            </form>
                            <h3>Customer Reviews</h3>

                            <div class="mb-4"
                                 th:each="review:${reviews}">
                                <div>
                                    <strong th:text="${review.user.fullName}">
                                    </strong>
                                    <span>⭐</span>
                                    <span th:text="${review.rating}"></span>
                                </div>
                                <p th:text="${review.comment}"></p>
                                <hr>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="booking-card sticky-top shadow-md bg-white p-4 rounded" style="top: 100px;">
                            <h3 class="tour-card-price mb-3 text-center" th:text="'$' + ${tour.price} + ' / person '"> </h3>
                            <hr>

                            <form th:action="@{/bookings}" method="POST">
                                <input type="hidden" name="tourId"  th:value="${tour.id}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                                <div class="mb-3">
                                    <label for="bookingDate" class="form-label fw-bold">Ngày đặt</label>
                                    <input type="date" class="form-control" id="bookingDate" name="bookingDate" required>
                                </div>

                                <div class="mb-3 row">
                                    <div class="col-6">
                                        <label for="adults" class="form-label fw-bold">Người</label>
                                        <input type="number" class="form-control" id="adults" name="numberOfPeople" value="1" min="1" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="note" class="form-label fw-bold">Ghi chú</label>
                                    <input type="text" class="form-control" id="note" name="note">
                                </div>

                                <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
                                    <span class="fw-bold fs-5">Tổng tiền:</span>
                                    <span class="fw-bold fs-4 text-primary" id="totalPrice">$1,299</span>
                                </div>

                                <button sec:authorize="isAuthenticated()"
                                         type="submit"
                                         class="btn btn-warning w-100 py-3 fw-bold fs-5 text-uppercase">

                                    Đặt Tour Ngay
                                </button>


                                <!-- Chưa login -->
                                <button sec:authorize="!isAuthenticated()"
                                        type="button"
                                        class="btn btn-secondary w-100 py-3 fw-bold fs-5 text-uppercase"
                                        disabled>

                                    🔒 Đăng nhập để đặt tour
                                </button>
                            </form>

                            <div class="text-center mt-3 text-muted small">
                                <p class="mb-0">Bạn sẽ chưa bị trừ tiền ở bước này.</p>
                                <p class="mb-0 mt-2">Hỗ trợ tư vấn: <strong class="text-dark">+1 234 567 8900</strong></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
