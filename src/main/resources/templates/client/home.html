<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{client/layouts/main}">
    <body>
        <div layout:fragment="content">

            <!-- Hero Section -->
            <section class="hero">
                <h1>Explore Your Dream Destination</h1>
                <p>Discover amazing tours around the world</p>
                <a th:href="@{/tours}" class="btn btn-primary">Explore Tours</a>
            </section>

            <!-- Featured Tours Section -->
            <div class="container my-5">
                <h2 class="section-title">Featured Tours</h2>
                <p class="section-subtitle">Choose from our best-selling packages</p>

                <div class="tour-grid">
                    <!-- Tour Card 1 -->
                    <div class="tour-card" th:each="tour : ${topTours}">
                        <div class="tour-card-image">
                            <img th:src="${tour.imageUrl != null ? tour.imageUrl : '/uploads/tours/default-tour.jpg'}" alt="Tour image">
                            <span class="tour-card-badge">HOT</span>
                        </div>
                        <div class="tour-card-content">
                            <h3 class="tour-card-title" th:text="${tour.name}"></h3>
                            <p class="tour-card-subtitle" th:text="|${tour.categoryName} • ${tour.durationDays} days|"></p>
                            <p class="tour-card-description" th:text="${tour.description}"></p>
                            <div class="tour-card-footer">
                                <span class="tour-card-price" th:text="'$' + ${#numbers.formatDecimal(tour.price, 1, 2)}"></span>
                                <a th:href="@{/tours/{id}(id=${tour.id})}" class="tour-card-btn text-decoration-none">Book Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
