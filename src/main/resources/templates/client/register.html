<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{client/layouts/main}">
    <head>
        <link rel="stylesheet" th:href="@{/css/login.css}">
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
    <body>
        <div layout:fragment="content">
            <div class="login-wrapper">
                <div class="login-container">

                    <!-- Left -->
                    <div class="login-left">
                        <div class="login-illustration">
                            <h1>🌍</h1>
                            <h2>Join Tour Booking</h2>
                            <p>Create your account and start your journey today.</p>

                            <div class="illustration-features">
                                <div class="feature-item">
                                    <span class="feature-icon">✈️</span>
                                    <span>Book Tours Easily</span>
                                </div>

                                <div class="feature-item">
                                    <span class="feature-icon">🎁</span>
                                    <span>Exclusive Offers</span>
                                </div>

                                <div class="feature-item">
                                    <span class="feature-icon">⭐</span>
                                    <span>Trusted Service</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right -->
                    <div class="login-right">
                        <div class="login-form-container">

                            <h3 class="login-title">Create Account</h3>
                            <p class="login-subtitle">
                                Fill in your information below
                            </p>

                            <form class="login-form"
                                  th:action="@{/register}"
                                  th:object="${user}"
                                  method="post">

                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>

                                <!-- Username -->
                                <div class="form-group">
                                    <label class="form-label">Username</label>
                                    <input
                                            type="text"
                                            class="form-control form-input"
                                            th:field="*{username}"
                                            placeholder="Enter username"
                                            required>

                                    <span class="form-error"
                                          th:if="${#fields.hasErrors('username')}"
                                          th:errors="*{username}">
                                    </span>
                                </div>

                                <!-- Full Name -->
                                <div class="form-group">
                                    <label class="form-label">Full Name</label>
                                    <input
                                            type="text"
                                            class="form-control form-input"
                                            th:field="*{fullName}"
                                            placeholder="Your full name"
                                            required>
                                </div>

                                <!-- Email -->
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input
                                            type="email"
                                            class="form-control form-input"
                                            th:field="*{email}"
                                            placeholder="example@gmail.com"
                                            required>

                                    <span class="form-error"
                                          th:if="${#fields.hasErrors('email')}"
                                          th:errors="*{email}">
                                    </span>
                                </div>

                                <!-- Phone -->
                                <div class="form-group">
                                    <label class="form-label">Phone</label>
                                    <input
                                            type="text"
                                            class="form-control form-input"
                                            th:field="*{phone}"
                                            placeholder="090xxxxxxx">
                                </div>

                                <!-- Password -->
                                <div class="form-group">
                                    <label class="form-label">Password</label>

                                    <div class="password-wrapper">
                                        <input
                                                id="password"
                                                type="password"
                                                name="password"
                                                class="form-control form-input"
                                                placeholder="Enter password"
                                                required>

                                        <button
                                                type="button"
                                                class="toggle-password">
                                            👁️
                                        </button>
                                    </div>
                                </div>

                                <!-- Confirm Password -->
                                <div class="form-group">
                                    <label class="form-label">Confirm Password</label>

                                    <div class="password-wrapper">
                                        <input
                                                id="confirmPassword"
                                                type="password"
                                                name="confirmPassword"
                                                class="form-control form-input"
                                                placeholder="Confirm password"
                                                required>

                                        <button
                                                type="button"
                                                class="toggle-password">
                                            👁️
                                        </button>
                                    </div>

                                    <span class="form-error"
                                          th:if="${passwordError}"
                                          th:text="${passwordError}">
                                    </span>
                                </div>

                                <button class="btn-login" type="submit">
                                    Create Account
                                </button>

                            </form>

                            <div class="divider">
                                <span>Or sign up with</span>
                            </div>

                            <div class="social-login">
                                <a  class="social-btn google-btn">
                                    🔍 Google
                                </a >
                            </div>

                            <div class="register-link">
                                <p>
                                    Already have an account?
                                    <a th:href="@{/login}" class="link-register">
                                        Sign In
                                    </a>
                                </p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            <script th:src="@{/js/user-register.js}"></script>
        </div>
    </body>
</html>
