<div th:fragment="categoryModals">
    <div class="modal fade"
         id="createCategoryModal"
         tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content">

                <form
                        th:action="@{/admin/categories}"
                        method="post"
                        th:object="${category}">

                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="modal-header">
                        <h5 class="modal-title">
                            Create Category
                        </h5>

                        <button
                                class="btn-close"
                                data-bs-dismiss="modal">
                        </button>
                    </div>

                    <div class="modal-body">

                        <div class="mb-3">

                            <label>Name</label>

                            <input th:field="*{name}" class="form-control" required>

                            <div class="text-danger" th:errors="*{name}"></div>

                        </div>

                        <div class="mb-3">
                            <label>Description</label>

                            <textarea rows="4" th:field="*{description}" class="form-control" required></textarea>

                            <div class="text-danger" th:errors="*{description}"></div>

                        </div>

                    </div>

                    <div class="modal-footer">

                        <button
                                class="btn btn-secondary"
                                data-bs-dismiss="modal"
                                type="button">
                            Cancel
                        </button>

                        <button
                                class="btn btn-primary">
                            Create
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>
    <div class="modal fade"
         id="editCategoryModal"
         tabindex="-1">

        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editCategoryForm"
                      method="post" th:object="${editCategory}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="_method" value="put">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            Edit Category
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal">
                        </button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>Name</label>
                            <input id="editName" th:field="*{name}" class="form-control" required>
                            <div class="text-danger" th:errors="*{name}"></div>
                        </div>
                        <div class="mb-3">
                            <label>Description</label>
                            <textarea
                                    id="editDescription"
                                    th:field="*{description}"
                                    rows="4"
                                    class="form-control"
                                    required></textarea>
                            <div class="text-danger" th:errors="*{description}"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancel
                        </button>
                        <button class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
