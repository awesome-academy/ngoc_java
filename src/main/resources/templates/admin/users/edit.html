<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/admin-layout}">

<body>
<div layout:fragment="content">

    <link rel="stylesheet" th:href="@{/css/admin-user.css}">

    <h2 class="mb-4">Update User</h2>

    <form th:action="@{/admin/users/{id}(id=${user.id})}"
          method="post"
          th:object="${user}"
          class="create-user-form">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="_method" value="put">

        <!-- Validation Summary -->
        <div th:if="${#fields.hasAnyErrors()}"
             class="alert alert-danger">
            <strong>Please fix the following errors:</strong>

            <ul class="mb-0 mt-2">
                <li th:each="error : ${#fields.errors('*')}"
                    th:text="${error}">
                </li>
            </ul>
        </div>

        <div class="row">

            <!-- LEFT -->
            <div class="col-md-8">

                <!-- Username -->
                <div class="form-group mb-3">
                    <label class="form-label">Username</label>

                    <input type="text"
                           th:field="*{username}"
                           class="form-control"
                           placeholder="Enter username"
                           required>

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('username')}"
                         th:errors="*{username}">
                    </div>
                </div>

                <!-- Full Name -->
                <div class="form-group mb-3">
                    <label class="form-label">Full Name</label>

                    <input type="text"
                           th:field="*{fullName}"
                           class="form-control"
                           placeholder="Enter full name"
                           required>

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('fullName')}"
                         th:errors="*{fullName}">
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group mb-3">
                    <label class="form-label">Email</label>

                    <input type="email"
                           th:field="*{email}"
                           class="form-control"
                           placeholder="example@gmail.com"
                           required>

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>
                </div>

                <!-- Phone -->
                <div class="form-group mb-3">
                    <label class="form-label">Phone</label>

                    <input type="text"
                           th:field="*{phone}"
                           class="form-control"
                           placeholder="090xxxxxxx">

                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}">
                    </div>
                </div>

                <div class="row">

                    <!-- Password -->
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label class="form-label">Password</label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Leave blank to keep current password">
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="col-md-6">
                        <div class="form-group mb-3">
                            <label class="form-label">Confirm Password</label>

                            <input type="password"
                                   name="confirmPassword"
                                   class="form-control"
                                   placeholder="Confirm new password">

                            <div class="text-danger mt-1"
                                 th:if="${passwordError}"
                                 th:text="${passwordError}">
                            </div>
                        </div>
                    </div>

                </div>

            </div>

            <!-- RIGHT -->
            <div class="col-md-4">

                <div class="card p-3">

                    <!-- Role -->
                    <div class="form-group mb-3">
                        <label class="form-label">Role</label>

                        <select th:field="*{role}"
                                class="form-select">

                            <option value="">Select Role</option>

                            <option th:each="role : ${roles}"
                                    th:value="${role}"
                                    th:text="${role}">
                            </option>

                        </select>

                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('role')}"
                             th:errors="*{role}">
                        </div>
                    </div>

                    <!-- Status -->
                    <div class="form-group mb-4">
                        <label class="form-label">Status</label>

                        <select th:field="*{status}"
                                class="form-select">

                            <option value="">Select Status</option>

                            <option th:each="status : ${statuses}"
                                    th:value="${status}"
                                    th:text="${status}">
                            </option>

                        </select>

                        <div class="text-danger mt-1"
                             th:if="${#fields.hasErrors('status')}"
                             th:errors="*{status}">
                        </div>
                    </div>

                    <div class="d-grid">
                        <button type="submit"
                                class="btn btn-primary">
                            Create User
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
