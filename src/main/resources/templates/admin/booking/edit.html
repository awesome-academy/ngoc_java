<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/admin-layout}">
    <body>
        <div layout:fragment="content">
            <!-- Page-specific CSS -->
            <link rel="stylesheet" th:href="@{/css/admin-tour.css}">

            <h2 class="mb-4">Edit Booking</h2>

            <form th:action="@{/admin/bookings/{id}(id=${booking.id})}" method="post" th:object="${booking}" enctype="multipart/form-data" class="create-tour-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="_method" value="put">
                <div th:if="${#fields.hasAnyErrors()}"
                     class="alert alert-danger">
                    <strong>Please fix the following errors:</strong>

                    <ul class="mb-0 mt-2">
                        <li th:each="error : ${#fields.errors('*')}"
                            th:text="${error}">
                        </li>
                    </ul>
                </div>
                <div class="row">
                    <div class="col-md-8">
                        <div class="form-group mb-3">
                            <label class="form-label">User Name</label>
                            <input type="text" th:field="*{userName}" class="form-control" th:readonly="true">

                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Tour Name</label>
                            <input th:field="*{tourName}" id="tourName" class="form-control" th:readonly="true"></input>
                        </div>


                        <div class="form-group mb-3">
                            <label class="form-label">Booking Status</label>
                            <select th:field="*{status}" class="form-select">
                                <option value="">
                                    Select Status
                                </option>
                                <option
                                        th:each="status : ${statuses}"
                                        th:value="${status}"
                                        th:text="${status}"
                                        th:selected="${status == booking.status}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Note</label>
                            <textarea th:field="*{note}" id="note" class="form-control" rows="6" placeholder="Describe the note..."></textarea>
                            <div class="text-danger mt-1"
                                 th:if="${#fields.hasErrors('note')}"
                                 th:errors="*{note}">
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Booking Date</label>
                            <input type="date"  class="form-control"  th:value="${#temporals.format(booking.bookingDate, 'yyyy-MM-dd')}" th:readonly="true">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Update Booking</button>
                        </div>
                    </div>
                </div>
            </form>

        </div>
    </body>
</html>
