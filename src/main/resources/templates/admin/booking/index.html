<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/admin-layout}">
    <body>
        <div layout:fragment="content">
            <link rel="stylesheet" th:href="@{/css/admin-tours.css}">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Booking</h2>
            </div>

            <div th:if="${successMessage}"
                 class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>
            <div th:if="${errorMessage}"
                 class="alert alert-danger">
                <span th:text="${errorMessage}"></span>

            </div>

            <!-- Search and Filter Form -->
            <form method="get" th:action="@{/admin/bookings}" class="card p-3 mb-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Search Keyword</label>
                        <input type="text" name="keyword" class="form-control" placeholder="Search by username, email, tourname..." th:value="${currentKeyword}">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="">All status</option>
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"
                                    th:selected="${currentStatus != '' and currentStatus == status}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/admin/bookings}" class="btn btn-secondary w-100">Reset</a>
                    </div>
                </div>
            </form>

            <!-- Tours Table -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Customer</th>
                            <th>Tour</th>
                            <th>People</th>
                            <th>Total Amount</th>
                            <th>Booking Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!-- Iterate over tours -->
                        <tr th:each="booking, iterStat : ${bookings}">
                            <td th:text="${(pageNumber - 1) * pageSize + iterStat.index + 1}"></td>
                            <td th:text="${booking.userName}"></td>
                            <td th:text="${booking.tourName}"></td>
                            <td th:text="${booking.numberOfPeople}"></td>
                            <td th:text="${booking.totalAmount}"></td>
                            <td th:text="${booking.bookingDate}"></td>
                            <td th:text="${booking.status}"></td>
                            <td>
                                <a th:href="@{/admin/bookings/{id}/edit(id=${booking.id})}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                                <form th:action="@{/admin/bookings/{id}(id=${booking.id})}" method="post" style="display: inline;">
                                    <input type="hidden" name="_method" value="delete">
                                    <button type="submit" class="btn btn-sm btn-outline-danger btn-delete" th:data-id="${booking.id}" onclick="return confirm('Are you sure you want to delete this booking?');">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <!-- If no tours -->
                        <tr th:if="${#lists.isEmpty(bookings)}">
                            <td colspan="8" class="text-center py-4">No bookings found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <div>
                        Showing page <span th:text="${pageNumber}">1</span> of <span th:text="${totalPages}">1</span>
                        (<span th:text="${totalElements}">0</span> items total)
                    </div>
                    <nav th:if="${totalPages > 0}" th:with="prevPage=${pageNumber - 2}, nextPage=${pageNumber}">
                        <ul class="pagination mb-0">
                            <!-- Previous Button -->
                            <li class="page-item" th:classappend="${pageNumber <= 1 ? 'disabled' : ''}">
                                <a class="page-link"
                                   th:if="${pageNumber <= 1}"
                                   href="javascript:void(0);"
                                   aria-label="Previous">«</a>
                                <a class="page-link"
                                   th:unless="${pageNumber <= 1}"
                                   th:href="@{/admin/bookings(page=${prevPage}, keyword=${currentKeyword}, status=${currentStatus})}"
                                   aria-label="Previous">«</a>
                            </li>

                            <!-- First Page Link -->
                            <li class="page-item" th:if="${pageNumber > 1}">
                                <a class="page-link" th:href="@{/admin/bookings(page=0, keyword=${currentKeyword}, status=${currentStatus})}">1</a>
                            </li>

                            <!-- Current Page -->
                            <li class="page-item active">
                                <a class="page-link" href="javascript:void(0);" th:text="${pageNumber}">1</a>
                            </li>

                            <!-- Next Page Link -->
                            <li class="page-item" th:if="${pageNumber < totalPages}">
                                <a class="page-link" th:href="@{/admin/bookings(page=${nextPage}, keyword=${currentKeyword}, status=${currentStatus})}">
                                    <span th:text="${pageNumber + 1}">2</span>
                                </a>
                            </li>

                            <!-- Next Button -->
                            <li class="page-item" th:classappend="${pageNumber >= totalPages ? 'disabled' : ''}">
                                <a class="page-link"
                                   th:if="${pageNumber >= totalPages}"
                                   href="javascript:void(0);"
                                   aria-label="Next">»</a>
                                <a class="page-link"
                                   th:unless="${pageNumber >= totalPages}"
                                   th:href="@{/admin/bookings(page=${nextPage}, keyword=${currentKeyword}, status=${currentStatus})}"
                                   aria-label="Next">»</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </body>
</html>
