<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/admin-layout}">
    <body>
        <div layout:fragment="content">

            <!-- Page-specific CSS -->
            <link rel="stylesheet" th:href="@{/css/admin-tour.css}">

            <h2 class="mb-4">Create Tour</h2>

            <form th:action="@{/admin/tours}" method="post" th:object="${tour}" enctype="multipart/form-data" class="create-tour-form">

                <div class="row">
                    <div class="col-md-8">

                        <div class="form-group mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Amazing Halong Bay" required>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Description</label>
                            <textarea th:field="*{description}" id="description" class="form-control" rows="6" placeholder="Describe the tour..."></textarea>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Departure Location</label>
                            <textarea th:field="*{departureLocation}" id="shortDescription" class="form-control" rows="3" placeholder="Short summary..."></textarea>
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label">Destination</label>
                            <textarea th:field="*{destination}" id="destination" class="form-control" rows="3" placeholder="Short summary..."></textarea>
                        </div>

                        <div class="form-row d-flex gap-3">
                            <div class="form-group flex-fill">
                                <label class="form-label">Price (VND)</label>
                                <input type="number" th:field="*{price}" id="price" class="form-control" min="0" required>
                            </div>

                            <div class="form-group flex-fill">
                                <label class="form-label">Max People</label>
                                <input type="number" th:field="*{maxPeople}" id="seats" class="form-control" min="1" required>
                            </div>

                            <div class="form-group flex-fill">
                                <label class="form-label">Duration (days)</label>
                                <input type="number" th:field="*{durationDays}" id="duration" class="form-control" min="1">
                            </div>
                        </div>

                    </div>

                    <div class="col-md-4">
                        <div class="card p-3">
                            <div class="form-group mb-3">
                                <label class="form-label">Category</label>
                                <select th:field="*{categoryId}" class="form-select">
                                    <option value="">
                                        Select Category
                                    </option>
                                    <option
                                            th:each="category : ${categories}"
                                            th:value="${category.id}"
                                            th:text="${category.name}">
                                    </option>
                                </select>
                            </div>

                            <div class="form-group mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" th:field="*{startDate}" class="form-control">
                            </div>

                            <div class="form-group mb-3">
                                <label class="form-label">End Date</label>
                                <input type="date" th:field="*{endDate}" class="form-control">
                            </div>

                            <div class="form-group mb-3">
                                <label class="form-label">Status</label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="">
                                        Select Status
                                    </option>
                                    <option
                                            th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:text="${status}">
                                    </option>
                                </select>
                            </div>

                            <div class="form-group mb-3">
                                <label class="form-label">Upload Images</label>
                                <input type="file" name="images" id="images" class="form-control" accept="image/*" multiple>
                                <div id="imagePreview" class="image-preview mt-2"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Create Tour</button>
                            </div>
                        </div>
                    </div>
                </div>

            </form>
        </div>
    </body>
</html>
