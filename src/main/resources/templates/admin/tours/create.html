<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/admin-layout}">

    <div layout:fragment="content">

        <!-- Page-specific CSS -->
        <link rel="stylesheet" th:href="@{/css/admin-tour.css}">

        <h2 class="mb-4">Create Tour</h2>

        <form th:action="@{/admin/tours}" method="post" enctype="multipart/form-data" class="create-tour-form">

            <div class="row">
                <div class="col-md-8">

                    <div class="form-group mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" id="title" class="form-control" placeholder="Amazing Halong Bay" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Short Description</label>
                        <textarea name="shortDescription" id="shortDescription" class="form-control" rows="3" placeholder="Short summary..."></textarea>
                    </div>

                    <div class="form-group mb-3">
                        <label class="form-label">Detailed Description</label>
                        <textarea name="description" id="description" class="form-control" rows="6" placeholder="Describe the tour..."></textarea>
                    </div>

                    <div class="form-row d-flex gap-3">
                        <div class="form-group flex-fill">
                            <label class="form-label">Price (VND)</label>
                            <input type="number" name="price" id="price" class="form-control" min="0" required>
                        </div>

                        <div class="form-group flex-fill">
                            <label class="form-label">Seats</label>
                            <input type="number" name="seats" id="seats" class="form-control" min="1" required>
                        </div>

                        <div class="form-group flex-fill">
                            <label class="form-label">Duration (days)</label>
                            <input type="number" name="duration" id="duration" class="form-control" min="1">
                        </div>
                    </div>

                </div>

                <div class="col-md-4">
                    <div class="card p-3">
                        <div class="form-group mb-3">
                            <label class="form-label">Category</label>
                            <select name="categoryId" id="categoryId" class="form-select">
                                <option value="">-- Select category --</option>
                                <!-- Example options; replace with th:each in controller -->
                                <option value="1">Beach</option>
                                <option value="2">Mountain</option>
                                <option value="3">City</option>
                            </select>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Start Date</label>
                            <input type="date" name="startDate" id="startDate" class="form-control">
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Status</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="published" id="published" checked>
                                <label class="form-check-label" for="published">Published</label>
                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label class="form-label">Upload Images</label>
                            <input type="file" name="images" id="images" class="form-control" accept="image/*" multiple>
                            <div id="imagePreview" class="image-preview mt-2"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Create Tour</button>
                        </div>

                    </div>
                </div>
            </div>

        </form>

        <!-- Page-specific JS -->
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script th:src="@{/js/admin-tour.js}"></script>

    </div>

</html>
