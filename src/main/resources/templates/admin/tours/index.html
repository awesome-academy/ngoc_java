<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layouts/admin-layout}">
    <body>
        <div layout:fragment="content">
            <link rel="stylesheet" th:href="@{/css/admin-tours.css}">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0">Tours</h2>
                <div>
                    <a th:href="@{/admin/tours/new}" class="btn btn-success">+ Create Tour</a>
                </div>
            </div>

            <div th:if="${successMessage}"
                 class="alert alert-success alert-dismissible fade show">
                <span th:text="${successMessage}"></span>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                </button>
            </div>
            <div th:if="${errorMessage}"
                 class="alert alert-danger">
                <span th:text="${errorMessage}"></span>

            </div>

            <!-- Search and Filter Form -->
            <form method="get" th:action="@{/admin/tours}" class="card p-3 mb-3">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label">Search Title</label>
                        <input type="text" name="name" class="form-control" placeholder="Search by title..." th:value="${currentSearch}">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Category</label>
                        <select name="categoryId" class="form-select">
                            <option value="">All categories</option>
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${currentCategory != '' and currentCategory == category.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="">All status</option>
                            <option value="ACTIVE" th:selected="${currentStatus == 'ACTIVE'}">ACTIVE</option>
                            <option value="INACTIVE" th:selected="${currentStatus == 'INACTIVE'}">INACTIVE</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </div>
                    <div class="col-md-2">
                        <a th:href="@{/admin/tours}" class="btn btn-secondary w-100">Reset</a>
                    </div>
                </div>
            </form>

            <!-- Tours Table -->
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Seats</th>
                            <th>Start Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <!-- Iterate over tours -->
                        <tr th:each="tour, iterStat : ${tours}">
                            <td th:text="${(pageNumber - 1) * pageSize + iterStat.index + 1}"></td>
                            <td th:text="${tour.name}"></td>
                            <td th:text="${tour.categoryName}"></td>
                            <td th:text="${tour.price != null ? #numbers.formatInteger(tour.price, 0) + ' VND' : 'N/A'}"></td>
                            <td th:text="${tour.maxPeople}"></td>
                            <td th:text="${tour.startDate}"></td>
                            <td>
                                <span th:if="${tour.status == T(com.bookingtour.sun.enums.TourStatus).ACTIVE}" class="badge bg-success" th:text="${tour.status}"></span>
                                <span th:unless="${tour.status == T(com.bookingtour.sun.enums.TourStatus).ACTIVE}" class="badge bg-secondary" th:text="${tour.status}"></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/tours/{id}/edit(id=${tour.id})}" class="btn btn-sm btn-outline-primary me-1">Edit</a>
                                <form th:action="@{/admin/tours/{id}(id=${tour.id})}" method="post" style="display: inline;">
                                    <input type="hidden" name="_method" value="delete">
                                    <button type="submit" class="btn btn-sm btn-outline-danger btn-delete" th:data-id="${tour.id}" onclick="return confirm('Are you sure you want to delete this tour?');">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <!-- If no tours -->
                        <tr th:if="${#lists.isEmpty(tours)}">
                            <td colspan="8" class="text-center py-4">No tours found.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <div>
                        Showing page <span th:text="${pageNumber}">1</span> of <span th:text="${totalPages}">1</span>
                        (<span th:text="${totalElements}">0</span> items total)
                    </div>
                    <nav th:if="${totalPages > 0}" th:with="prevPage=${pageNumber - 2}, nextPage=${pageNumber}">
                        <ul class="pagination mb-0">
                            <!-- Previous Button -->
                            <li class="page-item" th:classappend="${pageNumber <= 1 ? 'disabled' : ''}">
                                <a class="page-link"
                                   th:if="${pageNumber <= 1}"
                                   href="javascript:void(0);"
                                   aria-label="Previous">«</a>
                                <a class="page-link"
                                   th:unless="${pageNumber <= 1}"
                                   th:href="@{/admin/tours(page=${prevPage}, search=${currentSearch}, status=${currentStatus}, category=${currentCategory})}"
                                   aria-label="Previous">«</a>
                            </li>

                            <!-- First Page Link -->
                            <li class="page-item" th:if="${pageNumber > 1}">
                                <a class="page-link" th:href="@{/admin/tours(page=0, search=${currentSearch}, status=${currentStatus}, category=${currentCategory})}">1</a>
                            </li>

                            <!-- Current Page -->
                            <li class="page-item active">
                                <a class="page-link" href="javascript:void(0);" th:text="${pageNumber}">1</a>
                            </li>

                            <!-- Next Page Link -->
                            <li class="page-item" th:if="${pageNumber < totalPages}">
                                <a class="page-link" th:href="@{/admin/tours(page=${nextPage}, search=${currentSearch}, status=${currentStatus}, category=${currentCategory})}">
                                    <span th:text="${pageNumber + 1}">2</span>
                                </a>
                            </li>

                            <!-- Next Button -->
                            <li class="page-item" th:classappend="${pageNumber >= totalPages ? 'disabled' : ''}">
                                <a class="page-link"
                                   th:if="${pageNumber >= totalPages}"
                                   href="javascript:void(0);"
                                   aria-label="Next">»</a>
                                <a class="page-link"
                                   th:unless="${pageNumber >= totalPages}"
                                   th:href="@{/admin/tours(page=${nextPage}, search=${currentSearch}, status=${currentStatus}, category=${currentCategory})}"
                                   aria-label="Next">»</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </body>
</html>
