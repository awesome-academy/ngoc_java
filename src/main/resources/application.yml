spring:
  application:
    name: sun

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Turn on hiddenhttpmethodfilter to support HTTP methods like PUT and DELETE in forms
  mvc:
    hiddenmethod:
      filter:
        enabled: true

# File upload directory (root property expected by FileStorageService)
file:
  upload-dir: uploads/tours

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
