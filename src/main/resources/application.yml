spring:
  application:
    name: sun

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# Turn on hiddenhttpmethodfilter to support HTTP methods like PUT and DELETE in forms
  mvc:
    hiddenmethod:
      filter:
        enabled: true

# File upload directory (root property expected by FileStorageService)
file:
  upload-dir: uploads/tours

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        orm:
          jdbc:
            bind: TRACE
